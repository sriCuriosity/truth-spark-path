<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NEXUS Tracker Dashboard</title>
  <style>
    :root {
      --background: #0d0f14;
      --surface: #131722;
      --elevated: #1e2433;
      --primary: #00f2fe;
      --border: rgba(255, 255, 255, 0.08);
      --foreground: #f8fafc;
      --muted: #94a3b8;
    }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: var(--background);
      color: var(--foreground);
      margin: 0;
      padding: 16px;
      overflow: hidden;
      font-size: 12px;
      user-select: none;
    }
    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-b: 1px solid var(--border);
      padding-bottom: 12px;
      margin-bottom: 12px;
    }
    .title {
      font-weight: 700;
      color: var(--primary);
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    .status {
      display: flex;
      align-items: center;
      gap: 4px;
      font-size: 10px;
      color: #10b981;
    }
    .status-dot {
      width: 6px;
      height: 6px;
      background: #10b981;
      border-radius: 50%;
      box-shadow: 0 0 8px #10b981;
    }
    .card {
      background: rgba(19, 23, 34, 0.6);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 12px;
      backdrop-filter: blur(10px);
    }
    .subtitle {
      font-size: 10px;
      color: var(--muted);
      text-transform: uppercase;
      margin-bottom: 8px;
      font-weight: 600;
    }
    .log-list {
      height: 300px;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 6px;
      padding-right: 4px;
    }
    .log-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 8px;
      background: var(--elevated);
      border-radius: 4px;
      border: 1px solid transparent;
      transition: all 0.2s;
    }
    .log-item:hover {
      border-color: rgba(0, 242, 254, 0.2);
    }
    .log-file {
      font-family: monospace;
      font-size: 10px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      max-width: 200px;
    }
    .log-action {
      font-size: 9px;
      color: var(--muted);
    }
    .tag {
      font-size: 9px;
      background: rgba(0, 242, 254, 0.1);
      color: var(--primary);
      padding: 2px 6px;
      border-radius: 99px;
      border: 1px solid rgba(0, 242, 254, 0.2);
    }
    .footer {
      margin-top: 12px;
      text-align: center;
      font-size: 9px;
      color: var(--muted);
    }
  </style>
</head>
<body>
  <div class="header">
    <div class="title">NEXUS Activity Tracker</div>
    <div class="status">
      <div class="status-dot"></div>
      <span>Watching...</span>
    </div>
  </div>

  <div class="card">
    <div class="subtitle">Decentralized Workspace Log</div>
    <div class="log-list" id="logList">
      <!-- Activity items get appended dynamically -->
    </div>
  </div>

  <div class="footer">
    Indexed at ~/nexus_workspace • Local first encrypted
  </div>

  <script>
    const logList = document.getElementById('logList');

    function addLogItem(data) {
      const item = document.createElement('div');
      item.className = 'log-item';
      
      const fileSplit = data.filepath.split(/[\\/]/);
      const filename = fileSplit[fileSplit.length - 1];

      item.innerHTML = `
        <div>
          <div class="log-file" title="${data.filepath}">${filename}</div>
          <div class="log-action">${data.action.replace('_', ' ')}</div>
        </div>
        <div class="tag">${data.semantic_tag}</div>
      `;
      logList.insertBefore(item, logList.firstChild);
      if (logList.children.length > 50) {
        logList.removeChild(logList.lastChild);
      }
    }

    // Load initial logs
    window.nexusAPI.getRecentActivity().then(logs => {
      logs.forEach(log => addLogItem(log));
    });

    // Listen to real-time events
    window.nexusAPI.onActivityUpdate((data) => {
      addLogItem(data);
    });
  </script>
</body>
</html>
